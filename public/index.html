<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Secret Chat</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Entry Screen -->
<div id="entry-screen">
  <div class="entry-card">
    <div class="entry-logo">
      <!-- Chat bubble icon -->
      <svg viewBox="0 0 24 24" width="36" height="36" fill="#fff">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <h1>Secret Chat</h1>
    <p>Enter a room key to connect privately</p>
    <input type="text" id="name-input" placeholder="Your name..." maxlength="20"/>
    <input type="text" id="room-key-input" placeholder="Room key..." maxlength="20"/>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
      <button class="btn btn-secondary" onclick="generateKey()">Generate Key</button>
    </div>
    <p class="hint">Share the same key with your partner to connect</p>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen" class="hidden">
  <div class="chat-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="name" id="room-display">Room</div>
      <div class="status"><span class="status-dot"></span> online</div>
    </div>
    <div class="header-actions">
      <!-- Voice call -->
      <button class="hbtn" onclick="startCall('audio')" title="Voice call">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
      </button>
      <!-- Video call -->
      <button class="hbtn" onclick="startCall('video')" title="Video call">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
      </button>
      <!-- Delete -->
      <button class="hbtn danger" onclick="deleteAll()" title="Delete all messages">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
      </button>
      <!-- Leave -->
      <button class="hbtn" onclick="leaveRoom()" title="Leave room">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="chat-input-area">
    <label class="attach-btn" title="Send image">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
      </svg>
      <input type="file" id="img-input" accept="image/*" onchange="sendImage(event)" hidden/>
    </label>
    <div class="msg-input-wrap">
      <input type="text" id="msg-input" placeholder="Type a message"
             onkeydown="if(event.key==='Enter') sendMessage()"/>
    </div>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Call Overlay -->
<div id="call-overlay" class="hidden">
  <div class="call-info">
    <div class="call-name" id="call-partner-name">Partner</div>
    <div class="call-status" id="call-status-text">Calling...</div>
  </div>
  <div class="call-videos">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
  </div>
  <div class="call-controls">
    <!-- Mute -->
    <button class="call-btn mute" id="mute-btn" onclick="toggleMute()" title="Mute">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <!-- End call -->
    <button class="call-btn end" onclick="endCall()" title="End call">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08C.11 12.9 0 12.65 0 12.37c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.66c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.51-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
      </svg>
    </button>
    <!-- Camera toggle -->
    <button class="call-btn cam" id="cam-btn" onclick="toggleCam()" title="Camera">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Incoming Call Popup -->
<div id="incoming-call" class="hidden">
  <div class="ic-name" id="ic-caller-name">Someone</div>
  <div class="ic-type" id="ic-call-type">Video Call</div>
  <div class="ic-btns">
    <button class="ic-btn reject" onclick="rejectCall()">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08C.11 12.9 0 12.65 0 12.37c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.66c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.51-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
      </svg>
    </button>
    <button class="ic-btn accept" onclick="acceptCall()">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
      </svg>
    </button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
